<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sneakers | E-commerce Product Page</title>
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style1.css">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <div class="header-left">
                <button class="menu-toggle" id="menuToggle" aria-label="Open navigation menu">
                    <img src="./images/icon-menu.svg" alt="">
                </button>
                <div class="logo">
                    <a href="/"><img src="./images/logo.svg" alt="Sneakers Logo"></a>
                </div>
                <nav class="desktop-nav" aria-label="Primary navigation">
                    <ul>
                        <li><a href="#">Collections</a></li>
                        <li><a href="#">Men</a></li>
                        <li><a href="#">Women</a></li>
                        <li><a href="#">About</a></li>
                        <li><a href="#">Contact</a></li>
                    </ul>
                </nav>
            </div>

            <div class="header-right">
                <div class="cart-wrapper">
                    <button class="cart-btn" id="cartBtn" aria-label="Shopping cart">
                        <img src="./images/icon-cart.svg" alt="Cart">
                        <span class="cart-badge" id="cartBadge" aria-label="Number of items in cart">0</span>
                    </button>
                </div>
                <div class="user-avatar">
                    <button class="avatar-btn" aria-label="User profile">
                        <img src="./images/image-avatar.png" alt="User avatar">
                    </button>
                </div>
            </div>
        </div>
    </header>

    <div class="mobile-nav-overlay" id="mobileNavOverlay">
        <div class="mobile-nav-drawer">
            <button class="close-menu" id="closeMenu" aria-label="Close navigation menu">
                <img src="./images/icon-close.svg" alt="">
            </button>
            <nav class="mobile-nav">
                <ul>
                    <li><a href="#">Collections</a></li>
                    <li><a href="#">Men</a></li>
                    <li><a href="#">Women</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
            </nav>
        </div>
    </div>

        <section class="product-section" aria-label="Product details">

            <div class="product-gallery">
                <!-- Main Product Image -->
                <div class="main-image-wrapper">
                    <button class="mobile-gallery-btn prev" id="mobilePrev" aria-label="Previous image">
                        <img src="./images/icon-previous.svg" alt="">
                    </button>
                    <img src="./images/image-product-1.jpg" alt="Product image 1" class="main-image" id="mainImage">
                    <button class="mobile-gallery-btn next" id="mobileNext" aria-label="Next image">
                        <img src="./images/icon-next.svg" alt="">
                    </button>
                </div>

                <!-- Thumbnail Images -->
                <div class="thumbnails">
                    <div class="thumbnail active" data-image="./images/image-product-1.jpg" tabindex="0" role="button"
                        aria-label="Product image 1">
                        <img src="./images/image-product-1-thumbnail.jpg" alt="Product thumbnail 1">
                    </div>
                    <div class="thumbnail" data-image="./images/image-product-2.jpg" tabindex="0" role="button"
                        aria-label="Product image 2">
                        <img src="./images/image-product-2-thumbnail.jpg" alt="Product thumbnail 2">
                    </div>
                    <div class="thumbnail" data-image="./images/image-product-3.jpg" tabindex="0" role="button"
                        aria-label="Product image 3">
                        <img src="./images/image-product-3-thumbnail.jpg" alt="Product thumbnail 3">
                    </div>
                    <div class="thumbnail" data-image="./images/image-product-4.jpg" tabindex="0" role="button"
                        aria-label="Product image 4">
                        <img src="./images/image-product-4-thumbnail.jpg" alt="Product thumbnail 4">
                    </div>
                </div>
            </div>
        <script src="script1.js"></script>
</body>
</html>
